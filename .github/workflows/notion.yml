name: Notion Sync

on:
  workflow_dispatch:   # 수동 실행 버튼 생성

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # notion-to-md 글로벌 설치
      - name: Install notion-to-md
        run: npm install -g notion-to-md

      # Notion에서 글 가져오기
      - name: Fetch Notion posts
        run: notion-to-md -k ${{ secrets.NOTION_API_KEY }} -i 2780d24dfb748022b0f9ca774059605c -o ./_posts

      # GitHub 저장소에 반영
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync from Notion" || echo "No changes to commit"
          git push
